name: Release

# Manual dispatch only — select the tag in the "Use workflow from" dropdown.
# GITHUB_REF_NAME resolves to the selected tag for the release job.
on:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            args: --target universal-apple-darwin
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - run: bun install --frozen-lockfile

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: "${{ matrix.platform == 'mac' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}"

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: src-tauri -> target

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — used by Tauri to sign updater bundles
          # (requires createUpdaterArtifacts in tauri.conf.json).
          # Applied to all platforms — both macOS and Windows need signing.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing & notarization — identity auto-detected from certificate
          APPLE_CERTIFICATE: ${{ matrix.platform == 'mac' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist-${{ matrix.platform }}
          path: "${{ join(fromJSON(steps.tauri-build.outputs.artifactPaths), '\n') }}"
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( \
            -name "*.dmg" \
            -o -name "*.app.tar.gz" \
            -o -name "*.app.tar.gz.sig" \
            -o -name "*.exe" \
            -o -name "*.msi" \
            -o -name "*.nsis.zip" \
            -o -name "*.nsis.zip.sig" \
          \) -exec cp {} release-files/ \;
          echo "Release files:" && ls -lh release-files/

      - name: Generate latest.json for updater
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: node .github/scripts/generate-latest-json.mjs

      - name: Upload artifacts to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$RELEASE_TAG" &>/dev/null; then
            echo "ERROR: Release $RELEASE_TAG does not exist. Create a draft release first."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" release-files/* --clobber
